<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">
  
  <div class="border-b border-slate-200 pb-6 flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-black text-slate-950 flex items-center space-x-3">
        <span>My Saved Favorites</span>
        <span class="text-xs font-bold px-3 py-1 bg-red-50 text-red-600 rounded-full border border-red-200">
          {{ wishlistService.wishlistItems().length }} saved
        </span>
      </h1>
      <p class="text-sm text-slate-500 mt-1">Manage products saved to your customer wishlist.</p>
    </div>

    <a routerLink="/products" class="text-sm font-bold text-red-600 hover:underline">
      Continue Shopping &rarr;
    </a>
  </div>

  <!-- Loading State -->
  <div *ngIf="wishlistService.isLoading()" class="py-16 text-center text-slate-400">
    <svg class="animate-spin w-8 h-8 text-red-600 mx-auto mb-3" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
    <p class="text-sm font-medium">Fetching your saved wishlist...</p>
  </div>

  <!-- Empty Wishlist State -->
  <div *ngIf="!wishlistService.isLoading() && wishlistService.wishlistItems().length === 0" class="bg-white border border-slate-200 rounded-3xl p-12 text-center">
    <div class="w-20 h-20 rounded-full bg-red-50 flex items-center justify-center text-red-500 mx-auto mb-4">
      <svg class="w-10 h-10 stroke-[1.5]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
      </svg>
    </div>
    <h3 class="text-lg font-bold text-slate-900 mb-1">Your wishlist is empty</h3>
    <p class="text-sm text-slate-500 max-w-sm mx-auto mb-6">Explore our catalog and click the heart icon on any product to save it for later.</p>
    <a routerLink="/products" class="px-6 py-3 bg-slate-950 hover:bg-slate-800 text-white font-bold rounded-2xl shadow-md transition">
      Explore Catalog
    </a>
  </div>

  <!-- Wishlist Grid -->
  <div *ngIf="!wishlistService.isLoading() && wishlistService.wishlistItems().length > 0" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
    <app-product-card *ngFor="let item of wishlistService.wishlistItems()" [product]="item.product"></app-product-card>
  </div>

</div>
