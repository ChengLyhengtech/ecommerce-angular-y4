<a [routerLink]="['/products', product.id]" class="group block bg-white rounded-2xl p-2.5 transition duration-300 hover:shadow-lg hover:-translate-y-0.5 border border-slate-100">
  
  <!-- Image Container (Compact 4:5 aspect ratio matching Zando/Shein style image) -->
  <div class="relative aspect-[4/5] rounded-xl overflow-hidden bg-slate-50 mb-3 border border-slate-100">
    <img [src]="getPrimaryImage()" [alt]="product.name" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
    
    <!-- Discount Tag if applicable -->
    <span *ngIf="product.isDiscounted" class="absolute top-2.5 left-2.5 px-2 py-0.5 bg-red-600 text-white text-[10px] font-black uppercase tracking-wider rounded shadow-sm">
      -{{ product.discountPercentage }}%
    </span>

    <!-- Out of Stock Badge -->
    <span *ngIf="product.totalAvailableStock <= 0" class="absolute top-2.5 right-2.5 px-2 py-0.5 bg-slate-900/80 text-white text-[9px] font-bold uppercase rounded">
      Sold Out
    </span>

    <!-- Quick Add Button Overlay on Hover -->
    <div class="absolute inset-x-2 bottom-2 opacity-0 group-hover:opacity-100 transition duration-300">
      <button 
        (click)="quickAddToCart($event)" 
        [disabled]="product.totalAvailableStock <= 0"
        class="w-full py-2 bg-slate-950 hover:bg-red-600 disabled:bg-slate-300 text-white text-xs font-bold rounded-xl shadow-md transition flex items-center justify-center space-x-1"
      >
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
        <span>Add to Bag</span>
      </button>
    </div>
  </div>

  <!-- Content Info matching provided reference image -->
  <div class="space-y-1 px-1">
    
    <!-- Title & Favorite Heart Line -->
    <div class="flex items-center justify-between gap-2">
      <h3 class="text-sm font-bold text-slate-900 truncate flex-1 group-hover:text-red-600 transition">
        {{ product.name }}
      </h3>
      <!-- Heart Wishlist Button -->
      <button 
        (click)="toggleWishlist($event)" 
        class="p-1 text-slate-400 hover:text-red-600 transition shrink-0 focus:outline-none" 
        title="Add to Wishlist"
      >
        <svg *ngIf="!isWishlisted" class="w-5 h-5 stroke-[1.8]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
        </svg>
        <svg *ngIf="isWishlisted" class="w-5 h-5 fill-red-600 text-red-600 animate-pulse" viewBox="0 0 24 24">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
        </svg>
      </button>
    </div>

    <!-- Price Line: Red Final Price, Discount %, Line-through Base Price -->
    <div class="flex items-baseline space-x-1.5 text-sm">
      <span class="font-black text-red-600">${{ product.finalPrice | number:'1.2-2' }}</span>
      <span *ngIf="product.isDiscounted" class="text-xs font-semibold text-slate-400">
        -{{ product.discountPercentage }}%
      </span>
      <span *ngIf="product.isDiscounted" class="text-xs text-slate-400 line-through">
        ${{ product.basePrice | number:'1.2-2' }}
      </span>
    </div>

    <!-- Color Swatches Dots -->
    <div *ngIf="variantColors.length > 0" class="flex items-center space-x-1.5 pt-1">
      <span 
        *ngFor="let color of variantColors" 
        [style.backgroundColor]="getColorHex(color)"
        class="w-3 h-3 rounded-full border border-slate-300 shadow-2xs inline-block"
        [title]="color"
      ></span>
    </div>

  </div>

</a>
